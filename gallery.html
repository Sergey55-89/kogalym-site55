<div class="gallery-lightbox" id="galleryLightbox" aria-hidden="true">

<script>
(() => {
  const box = document.getElementById('galleryLightbox');
  if (!box) return;
  const img = box.querySelector('img');
  const title = box.querySelector('b');
  const tag = box.querySelector('span');
  const close = () => {
    box.classList.remove('open');
    box.setAttribute('aria-hidden', 'true');
    img.src = '';
  };
  document.querySelectorAll('.gallery-card').forEach(card => {
    card.addEventListener('click', () => {
      img.src = card.dataset.src;
      img.alt = card.dataset.title || '';
      title.textContent = card.dataset.title || '';
      tag.textContent = card.dataset.tag || '';
      box.classList.add('open');
      box.setAttribute('aria-hidden', 'false');
    });
  });
  box.addEventListener('click', e => {
    if (e.target === box || e.target.classList.contains('gallery-lightbox__close')) close();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') close();
  });
})();
</script>
